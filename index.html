<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="180x180" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 面对面翻译助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --sab: env(safe-area-inset-bottom, 0px);
            --sat: env(safe-area-inset-top, 0px);
            --trans-size: 1.125rem; /* 默认 18px */
        }

        body { 
            font-family: 'Inter', 'system-ui', sans-serif;
            overscroll-behavior-y: contain;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .recording-pulse {
            animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .word-annotation {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin: 0 1px;
            vertical-align: bottom;
        }
        .phonetic-note {
            font-size: 0.65rem;
            color: #4f46e5;
            font-weight: 600;
            line-height: 1;
            margin-bottom: 1px;
            background: #f5f3ff;
            padding: 0px 2px;
            border-radius: 3px;
            letter-spacing: -0.02em;
        }
        .rotate-180 { transform: rotate(180deg); }
        
        #translatedContainer {
            font-size: var(--trans-size);
            line-height: 1.6;
        }

        /* 隐藏 Safari 默认的弹性滚动 */
        #displayArea {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="bg-slate-100 w-screen overflow-hidden items-center p-3 sm:p-4">

    <!-- 对方端 (顶部) -->
    <div class="w-full max-w-2xl mb-3 rotate-180 shrink-0" style="padding-bottom: var(--sat);">
        <div class="bg-white rounded-2xl p-4 shadow-md border border-slate-200 flex flex-col items-center gap-2">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Partner Side</p>
            <button id="partnerMicBtn" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95 shadow-lg shadow-emerald-100">
                <i data-lucide="mic" class="w-5 h-5"></i>
                <span class="font-bold">Tap to Speak (English)</span>
            </button>
            <p id="partnerStatus" class="text-[10px] font-medium text-slate-500">English to Chinese Translation</p>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl shadow-slate-300/50 border border-slate-100 flex flex-col flex-1 min-h-0 overflow-hidden">
        <!-- 头部 -->
        <div class="bg-indigo-600 p-4 text-white flex justify-between items-center shrink-0">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-white/20 rounded-xl">
                    <i data-lucide="languages" class="w-5 h-5"></i>
                </div>
                <h1 class="text-base font-bold leading-none">AI 面对面翻译</h1>
            </div>
            <button id="settingsBtn" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- 设置面板 -->
        <div id="settingsPanel" class="hidden p-4 bg-slate-50 border-b border-slate-200 shrink-0 space-y-4">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">OpenAI API Key</label>
                <div class="flex gap-2">
                    <input type="password" id="apiKeyInput" placeholder="sk-..." class="flex-1 px-4 py-2 rounded-xl border border-slate-300 outline-none text-xs focus:ring-2 focus:ring-indigo-500">
                    <button id="saveKeyBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-medium">保存</button>
                </div>
            </div>
            <div class="pt-2 border-t border-slate-200">
                <label class="flex justify-between text-[10px] font-black text-slate-400 uppercase mb-2">
                    <span>翻译字体大小 (Font Size)</span>
                    <span id="fontSizeVal">18px</span>
                </label>
                <input type="range" id="fontSizeSlider" min="14" max="28" value="18" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>
        </div>

        <!-- 内容区域 -->
        <div id="displayArea" class="flex-1 p-5 overflow-y-auto bg-white">
            <div id="placeholder" class="h-full flex flex-col items-center justify-center text-slate-300 gap-3 text-center py-10">
                <i data-lucide="message-square" class="w-10 h-10 opacity-20"></i>
                <p class="text-sm italic">等待对话开始...<br>点击上方或下方按钮录音</p>
            </div>

            <div id="resultCard" class="hidden space-y-6">
                <div id="loadingIndicator" class="hidden flex items-center gap-3 text-indigo-500 animate-pulse">
                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                    <span class="text-xs font-medium">AI 正在处理...</span>
                </div>

                <div class="space-y-4 pb-6">
                    <div>
                        <h3 id="inputLabel" class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5">识别内容</h3>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <p id="originalText" class="text-slate-600 font-medium leading-relaxed text-sm"></p>
                        </div>
                    </div>

                    <div>
                        <h3 id="outputLabel" class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5">翻译结果</h3>
                        <div id="translatedContainer" class="bg-indigo-50/30 p-5 rounded-2xl border border-indigo-100 text-slate-900">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 用户端 (底部控制) -->
        <div class="p-6 bg-slate-50 border-t border-slate-100 flex flex-col items-center shrink-0" style="padding-bottom: calc(1.5rem + var(--sab));">
            <button id="userMicBtn" class="w-16 h-16 rounded-full bg-indigo-600 hover:bg-indigo-700 text-white shadow-xl flex items-center justify-center transition-all active:scale-90 relative z-10">
                <i id="userMicIcon" data-lucide="mic" class="w-7 h-7"></i>
            </button>
            <p id="userStatus" class="mt-3 text-[10px] font-bold text-slate-500 uppercase tracking-wider text-center">Tap to Speak (Chinese)</p>
        </div>
    </div>

    <!-- 成本监控器 -->
    <div class="fixed right-4 flex flex-col items-end gap-2 group z-50" style="bottom: calc(1rem + var(--sab));">
        <div id="costDetail" class="hidden group-hover:flex bg-white shadow-2xl border border-slate-200 rounded-xl p-3 flex-col gap-1.5 mb-2 scale-in-br origin-bottom-right">
            <div class="flex justify-between gap-6 text-[9px] uppercase font-bold text-slate-400">
                <span>Whisper STT</span>
                <span id="whisperCost">$0.00000</span>
            </div>
            <div class="flex justify-between gap-6 text-[9px] uppercase font-bold text-slate-400">
                <span>GPT Trans</span>
                <span id="gptCost">$0.00000</span>
            </div>
            <div class="h-px bg-slate-100 my-1"></div>
            <div class="flex justify-between gap-6 text-[9px] font-black text-indigo-600">
                <span>TOTAL</span>
                <span id="totalCostDetail">$0.00000</span>
            </div>
        </div>
        <div class="bg-white/90 backdrop-blur shadow-lg border border-slate-200 rounded-full px-3 py-1.5 flex items-center gap-2 cursor-pointer transition-all">
            <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
            <span id="totalCostDisplay" class="font-mono text-[9px] font-black text-slate-800">$0.00000</span>
        </div>
    </div>

    <!-- 错误提示 -->
    <div id="errorBox" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-5 py-2.5 rounded-full shadow-2xl hidden flex items-center gap-2 z-[60]">
        <i data-lucide="alert-circle" class="w-4 h-4"></i>
        <span id="errorMessage" class="text-xs font-medium"></span>
    </div>

    <script>
        lucide.createIcons();

        const PRICING = {
            whisper: 0.006,
            gpt4oMini: { input: 0.150 / 1e6, output: 0.600 / 1e6 }
        };

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let recordingSource = null;
        let recordingStartTime;
        let apiKey = localStorage.getItem('openai_api_key') || '';
        let sessionStats = { whisperUSD: 0, gptUSD: 0, totalUSD: 0 };

        const userMicBtn = document.getElementById('userMicBtn');
        const partnerMicBtn = document.getElementById('partnerMicBtn');
        const userMicIcon = document.getElementById('userMicIcon');
        const userStatus = document.getElementById('userStatus');
        const partnerStatus = document.getElementById('partnerStatus');
        const placeholder = document.getElementById('placeholder');
        const resultCard = document.getElementById('resultCard');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const originalTextEl = document.getElementById('originalText');
        const translatedContainer = document.getElementById('translatedContainer');
        const inputLabel = document.getElementById('inputLabel');
        const outputLabel = document.getElementById('outputLabel');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const settingsPanel = document.getElementById('settingsPanel');
        const displayArea = document.getElementById('displayArea');
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeVal = document.getElementById('fontSizeVal');
        
        if (apiKey) apiKeyInput.value = apiKey;

        fontSizeSlider.oninput = (e) => {
            const size = e.target.value;
            document.documentElement.style.setProperty('--trans-size', size + 'px');
            fontSizeVal.innerText = size + 'px';
        };

        function updateCostUI() {
            sessionStats.totalUSD = sessionStats.whisperUSD + sessionStats.gptUSD;
            const fmt = (val) => `$${val.toFixed(5)}`;
            document.getElementById('totalCostDisplay').innerText = fmt(sessionStats.totalUSD);
            document.getElementById('whisperCost').innerText = fmt(sessionStats.whisperUSD);
            document.getElementById('gptCost').innerText = fmt(sessionStats.gptUSD);
            document.getElementById('totalCostDetail').innerText = fmt(sessionStats.totalUSD);
        }

        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            document.getElementById('errorMessage').innerText = msg;
            errorBox.classList.remove('hidden');
            setTimeout(() => errorBox.classList.add('hidden'), 5000);
        }

        async function toggleRecording(source) {
            if (!apiKey) {
                settingsPanel.classList.remove('hidden');
                showError("请先设置 API Key");
                return;
            }
            if (isRecording) {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                recordingSource = source;
                recordingStartTime = Date.now();
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const duration = (Date.now() - recordingStartTime) / 1000;
                    sessionStats.whisperUSD += (duration / 60) * PRICING.whisper;
                    updateCostUI();
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    processAudio(blob, source);
                    setUIState(false, source);
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                setUIState(true, source);
            } catch (err) { showError("麦克风错误: " + err.message); }
        }

        function setUIState(active, source) {
            isRecording = active;
            if (active) {
                if (source === 'user') {
                    userMicBtn.classList.add('recording-pulse', 'bg-red-500');
                    userStatus.innerText = "Listening... (Tap to stop)";
                } else {
                    partnerMicBtn.classList.add('recording-pulse', 'bg-red-500');
                    partnerStatus.innerText = "Recording English...";
                }
            } else {
                userMicBtn.classList.remove('recording-pulse', 'bg-red-500');
                partnerMicBtn.classList.remove('recording-pulse', 'bg-red-500');
                userStatus.innerText = "Tap to Speak (Chinese)";
                partnerStatus.innerText = "Tap to Speak (English)";
            }
        }

        async function processAudio(blob, source) {
            placeholder.classList.add('hidden');
            resultCard.classList.remove('hidden');
            loadingIndicator.classList.remove('hidden');
            originalTextEl.innerText = "";
            translatedContainer.innerHTML = "";
            inputLabel.innerText = source === 'user' ? "识别内容 (你)" : "Transcribed (Partner)";
            outputLabel.innerText = source === 'user' ? "翻译结果 (To English)" : "翻译结果 (给你的中文)";
            try {
                const formData = new FormData();
                formData.append('file', blob, 'audio.webm');
                formData.append('model', 'whisper-1');
                formData.append('prompt', source === 'user' 
                    ? 'A conversation in Chinese, likely containing some English words. Please transcribe accurately.' 
                    : 'Clear English speech. Please transcribe accurately.');
                
                const sttRes = await fetch('https://api.openai.com/v1/audio/transcriptions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}` },
                    body: formData
                });
                if (!sttRes.ok) throw new Error("Whisper 识别失败");
                const sttData = await sttRes.json();
                originalTextEl.innerText = sttData.text;
                await callAITranslator(sttData.text, source);
                setTimeout(() => { displayArea.scrollTo({ top: displayArea.scrollHeight, behavior: 'smooth' }); }, 100);
            } catch (err) { showError(err.message); loadingIndicator.classList.add('hidden'); }
        }

        async function callAITranslator(text, source) {
            const systemPrompt = source === 'user' 
                ? `You are a professional interpreter.
                   1. Translate the input (Chinese or Mixed) into natural English.
                   2. Identify long, complex, or non-intuitively pronounced words.
                   3. ANNOTATION RULE: Do not use IPA symbols. Use "Phonetic Respelling" based on intuitive English sounds. Use hyphens to split syllables and simple letter combinations for sounds.
                      Examples: 'Colonel' -> 'ker-nal', 'Pronunciation' -> 'pro-nun-ci-ation', 'Chaos' -> 'kay-oss', 'Specific' -> 'spe-si-fik'.
                   4. CRITICAL: The 'translation' field must be a clean, natural English sentence. It MUST NOT contain any phonetic respelling marks, syllable-break hyphens, or phonetic notations.
                   
                   Return ONLY a JSON object:
                   {
                     "translation": "English translation here (must not contain any phonetic respelling marks)",
                     "annotations": [{"word": "targetWord", "phonetic": "respelled-version"}]
                   }`
                : `You are a professional interpreter. Translate the provided English input into natural, idiomatic Chinese.
                   
                   Return ONLY a JSON object:
                   {
                     "translation": "Chinese translation here",
                     "annotations": []
                   }`;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: text }
                        ],
                        response_format: { type: "json_object" }
                    })
                });
                if (!response.ok) throw new Error("GPT 翻译失败");
                const data = await response.json();
                if (data.usage) {
                    sessionStats.gptUSD += (data.usage.prompt_tokens * PRICING.gpt4oMini.input) + (data.usage.completion_tokens * PRICING.gpt4oMini.output);
                    updateCostUI();
                }
                const result = JSON.parse(data.choices[0].message.content);
                renderTranslation(result, source);
            } catch (err) { translatedContainer.innerText = "翻译出错：" + err.message; } finally { loadingIndicator.classList.add('hidden'); }
        }

        function renderTranslation(data, source) {
            const { translation, annotations } = data;
            let finalHtml = translation;
            if (source === 'user' && annotations && annotations.length > 0) {
                annotations.forEach(item => {
                    const regex = new RegExp(`\\b${item.word}\\b`, 'gi');
                    finalHtml = finalHtml.replace(regex, (match) => {
                        return `<span class="word-annotation">
                            <span class="phonetic-note">${item.phonetic}</span>
                            <span class="font-bold text-indigo-700 underline decoration-indigo-200 underline-offset-4">${match}</span>
                        </span>`;
                    });
                });
            }
            translatedContainer.innerHTML = finalHtml;
        }

        userMicBtn.onclick = () => toggleRecording('user');
        partnerMicBtn.onclick = () => toggleRecording('partner');
        document.getElementById('settingsBtn').onclick = () => settingsPanel.classList.toggle('hidden');
        document.getElementById('saveKeyBtn').onclick = () => {
            apiKey = document.getElementById('apiKeyInput').value.trim();
            localStorage.setItem('openai_api_key', apiKey);
            settingsPanel.classList.add('hidden');
            showError("API Key 已更新");
        };

    </script>
</body>
</html>
