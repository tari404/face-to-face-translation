<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 面对面翻译助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', 'system-ui', sans-serif; }
        .recording-pulse {
            animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .word-annotation {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin: 0 2px;
            vertical-align: bottom;
        }
        .phonetic-note {
            font-size: 0.7rem;
            color: #6366f1;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 2px;
            background: #eef2ff;
            padding: 1px 3px;
            border-radius: 4px;
        }
        .rotate-180 { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center p-4">

    <!-- Partner Side (Top) -->
    <div class="w-full max-w-2xl mb-4 rotate-180">
        <div class="bg-white rounded-3xl p-6 shadow-md border border-slate-200 flex flex-col items-center gap-3">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Partner Side</p>
            <button id="partnerMicBtn" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-95 shadow-lg shadow-emerald-100">
                <i data-lucide="mic" class="w-6 h-6"></i>
                <span class="font-bold text-lg">Tap to Speak (English)</span>
            </button>
            <p id="partnerStatus" class="text-sm font-medium text-slate-500">I will translate your English to Chinese</p>
        </div>
    </div>

    <!-- Main Container -->
    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl shadow-slate-300/50 overflow-hidden border border-slate-100 flex flex-col">
        <!-- Header -->
        <div class="bg-indigo-600 p-5 text-white flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-white/20 rounded-xl">
                    <i data-lucide="languages" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold leading-none">AI 面对面翻译</h1>
                    <p class="text-indigo-100 text-[10px] mt-1 uppercase tracking-tighter">Whisper-1 + GPT-4o-Mini</p>
                </div>
            </div>
            <button id="settingsBtn" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- API Config (Collapsible) -->
        <div id="settingsPanel" class="hidden p-6 bg-slate-50 border-b border-slate-200">
            <label class="block text-sm font-semibold text-slate-700 mb-2">OpenAI API Key</label>
            <div class="flex gap-2">
                <input type="password" id="apiKeyInput" placeholder="sk-..." class="flex-1 px-4 py-2 rounded-xl border border-slate-300 outline-none text-sm focus:ring-2 focus:ring-indigo-500">
                <button id="saveKeyBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-indigo-700 transition-colors">保存</button>
            </div>
        </div>

        <!-- Content Area -->
        <div id="displayArea" class="p-6 min-h-[300px] flex flex-col gap-6 overflow-y-auto max-h-[50vh]">
            <div id="placeholder" class="flex-1 flex flex-col items-center justify-center text-slate-300 gap-3 text-center py-12">
                <i data-lucide="refresh-cw" class="w-10 h-10 opacity-20"></i>
                <p class="text-sm italic">等待对话开始...<br>点击上方或下方按钮录音</p>
            </div>

            <div id="resultCard" class="hidden space-y-6">
                <div id="loadingIndicator" class="hidden flex items-center gap-3 text-indigo-500 animate-pulse">
                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                    <span class="text-sm font-medium">AI 正在处理...</span>
                </div>

                <div class="space-y-4">
                    <div class="group">
                        <h3 id="inputLabel" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">识别内容</h3>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <p id="originalText" class="text-slate-700 font-medium leading-relaxed"></p>
                        </div>
                    </div>

                    <div class="group">
                        <h3 id="outputLabel" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">翻译结果</h3>
                        <div id="translatedContainer" class="bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100 min-h-[80px] text-xl text-slate-900 leading-[2.6rem]">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- User Side (Bottom) -->
        <div class="p-8 bg-slate-50 border-t border-slate-100 flex flex-col items-center">
            <button id="userMicBtn" class="w-20 h-20 rounded-full bg-indigo-600 hover:bg-indigo-700 text-white shadow-xl flex items-center justify-center transition-all active:scale-90 relative z-10">
                <i id="userMicIcon" data-lucide="mic" class="w-8 h-8"></i>
            </button>
            <p id="userStatus" class="mt-4 text-sm font-bold text-slate-600 uppercase tracking-wider">Tap to Speak (Chinese)</p>
        </div>
    </div>

    <!-- Cost Monitor -->
    <div class="fixed bottom-6 right-6 flex flex-col items-end gap-2 group">
        <div id="costDetail" class="hidden group-hover:flex bg-white shadow-2xl border border-slate-200 rounded-2xl p-4 flex-col gap-2 mb-2 scale-in-br origin-bottom-right">
            <div class="flex justify-between gap-8 text-[10px] uppercase font-bold text-slate-400">
                <span>Whisper STT</span>
                <span id="whisperCost">$0.00000</span>
            </div>
            <div class="flex justify-between gap-8 text-[10px] uppercase font-bold text-slate-400">
                <span>GPT Translation</span>
                <span id="gptCost">$0.00000</span>
            </div>
            <div class="h-px bg-slate-100 my-1"></div>
            <div class="flex justify-between gap-8 text-xs font-black text-indigo-600">
                <span>SESSION TOTAL</span>
                <span id="totalCostDetail">$0.00000</span>
            </div>
        </div>
        <div class="bg-white shadow-lg border border-slate-200 rounded-full px-4 py-2 flex items-center gap-2 cursor-pointer hover:border-indigo-300 transition-all">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            <span id="totalCostDisplay" class="font-mono text-[10px] font-black text-slate-800">$0.00000</span>
        </div>
    </div>

    <!-- Toast Error -->
    <div id="errorBox" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-2xl hidden flex items-center gap-2 z-50">
        <i data-lucide="alert-circle" class="w-4 h-4"></i>
        <span id="errorMessage" class="text-sm font-medium"></span>
    </div>

    <script>
        lucide.createIcons();

        // Config & Constants
        const PRICING = {
            whisper: 0.006, // $0.006/min
            gpt4oMini: { input: 0.150 / 1e6, output: 0.600 / 1e6 }
        };

        // State
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let recordingSource = null; // 'user' or 'partner'
        let recordingStartTime;
        let apiKey = localStorage.getItem('openai_api_key') || '';
        let sessionStats = { whisperUSD: 0, gptUSD: 0, totalUSD: 0 };

        // DOM Elements
        const userMicBtn = document.getElementById('userMicBtn');
        const partnerMicBtn = document.getElementById('partnerMicBtn');
        const userMicIcon = document.getElementById('userMicIcon');
        const userStatus = document.getElementById('userStatus');
        const partnerStatus = document.getElementById('partnerStatus');
        const placeholder = document.getElementById('placeholder');
        const resultCard = document.getElementById('resultCard');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const originalTextEl = document.getElementById('originalText');
        const translatedContainer = document.getElementById('translatedContainer');
        const inputLabel = document.getElementById('inputLabel');
        const outputLabel = document.getElementById('outputLabel');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const settingsPanel = document.getElementById('settingsPanel');
        
        if (apiKey) apiKeyInput.value = apiKey;

        function updateCostUI() {
            sessionStats.totalUSD = sessionStats.whisperUSD + sessionStats.gptUSD;
            const fmt = (val) => `$${val.toFixed(5)}`;
            document.getElementById('totalCostDisplay').innerText = fmt(sessionStats.totalUSD);
            document.getElementById('whisperCost').innerText = fmt(sessionStats.whisperUSD);
            document.getElementById('gptCost').innerText = fmt(sessionStats.gptUSD);
            document.getElementById('totalCostDetail').innerText = fmt(sessionStats.totalUSD);
        }

        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            document.getElementById('errorMessage').innerText = msg;
            errorBox.classList.remove('hidden');
            setTimeout(() => errorBox.classList.add('hidden'), 5000);
        }

        async function toggleRecording(source) {
            if (!apiKey) {
                settingsPanel.classList.remove('hidden');
                showError("请先设置 API Key");
                return;
            }

            if (isRecording) {
                mediaRecorder.stop();
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                recordingSource = source;
                recordingStartTime = Date.now();

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const duration = (Date.now() - recordingStartTime) / 1000;
                    sessionStats.whisperUSD += (duration / 60) * PRICING.whisper;
                    updateCostUI();
                    
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    processAudio(blob, source);
                    setUIState(false, source);
                };

                mediaRecorder.start();
                setUIState(true, source);
            } catch (err) {
                showError("麦克风权限错误: " + err.message);
            }
        }

        function setUIState(active, source) {
            isRecording = active;
            if (active) {
                if (source === 'user') {
                    userMicBtn.classList.add('recording-pulse', 'bg-red-500');
                    userStatus.innerText = "Listening... (Tap to stop)";
                } else {
                    partnerMicBtn.classList.add('recording-pulse', 'bg-red-500');
                    partnerStatus.innerText = "Recording... Speak clearly";
                }
            } else {
                userMicBtn.classList.remove('recording-pulse', 'bg-red-500');
                partnerMicBtn.classList.remove('recording-pulse', 'bg-red-500');
                userStatus.innerText = "Tap to Speak (Chinese)";
                partnerStatus.innerText = "Tap to Speak (English)";
            }
        }

        async function processAudio(blob, source) {
            placeholder.classList.add('hidden');
            resultCard.classList.remove('hidden');
            loadingIndicator.classList.remove('hidden');
            originalTextEl.innerText = "";
            translatedContainer.innerHTML = "";

            // Labeling
            inputLabel.innerText = source === 'user' ? "识别内容 (你)" : "Transcribed (Partner)";
            outputLabel.innerText = source === 'user' ? "翻译结果 (To English)" : "翻译结果 (给你的中文)";

            try {
                // 1. STT
                const formData = new FormData();
                formData.append('file', blob, 'audio.webm');
                formData.append('model', 'whisper-1');
                formData.append('prompt', source === 'user' ? '中文对话，可能有英文单词。' : 'English speech, maybe with some accent.');

                const sttRes = await fetch('https://api.openai.com/v1/audio/transcriptions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}` },
                    body: formData
                });
                if (!sttRes.ok) throw new Error("识别失败");
                const sttData = await sttRes.json();
                originalTextEl.innerText = sttData.text;

                // 2. Translation
                await callAITranslator(sttData.text, source);
            } catch (err) {
                showError(err.message);
                loadingIndicator.classList.add('hidden');
            }
        }

        async function callAITranslator(text, source) {
            const systemPrompt = source === 'user' 
                ? `你是一个地道的同声传译。
                   任务：
                   1. 将输入(中文或中英混合)翻译成自然的英文。
                   2. 挑选出翻译中发音“不寻常、不符合常规拼读直觉”的少数重点单词。
                   3. **注音规则**：排除类似 "cumulative", "international", "student" 这种可以通过常规自然拼读或词根逻辑轻松猜出的词。只关注类似 "colonel", "choir", "epitome", "chaos", "gauge", "indict" 等拼写与读音差异巨大的词。如果没有这类词，则不要提供 annotations。
                   
                   返回 JSON 格式：
                   {
                     "translation": "英文翻译全句",
                     "annotations": [{"word": "单词", "phonetic": "/音标/"}]
                   }`
                : `你是一个专业的同声传译。
                   任务：将输入的英文翻译成通俗易懂、地道的中文。
                   
                   返回 JSON 格式：
                   {
                     "translation": "中文翻译结果",
                     "annotations": []
                   }`;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: text }
                        ],
                        response_format: { type: "json_object" }
                    })
                });

                if (!response.ok) throw new Error("翻译接口异常");
                const data = await response.json();
                
                // Track GPT Cost
                if (data.usage) {
                    sessionStats.gptUSD += (data.usage.prompt_tokens * PRICING.gpt4oMini.input) + 
                                           (data.usage.completion_tokens * PRICING.gpt4oMini.output);
                    updateCostUI();
                }

                const result = JSON.parse(data.choices[0].message.content);
                renderTranslation(result, source);
            } catch (err) {
                translatedContainer.innerText = "翻译出错：" + err.message;
            } finally {
                loadingIndicator.classList.add('hidden');
            }
        }

        function renderTranslation(data, source) {
            const { translation, annotations } = data;
            let finalHtml = translation;

            if (source === 'user' && annotations && annotations.length > 0) {
                annotations.forEach(item => {
                    const regex = new RegExp(`\\b${item.word}\\b`, 'gi');
                    finalHtml = finalHtml.replace(regex, (match) => {
                        return `<span class="word-annotation">
                            <span class="phonetic-note">${item.phonetic}</span>
                            <span class="font-bold text-indigo-700 underline decoration-indigo-200 underline-offset-4">${match}</span>
                        </span>`;
                    });
                });
            }

            translatedContainer.innerHTML = finalHtml;
        }

        // Listeners
        userMicBtn.onclick = () => toggleRecording('user');
        partnerMicBtn.onclick = () => toggleRecording('partner');
        document.getElementById('settingsBtn').onclick = () => settingsPanel.classList.toggle('hidden');
        document.getElementById('saveKeyBtn').onclick = () => {
            apiKey = document.getElementById('apiKeyInput').value.trim();
            localStorage.setItem('openai_api_key', apiKey);
            settingsPanel.classList.add('hidden');
            showError("API Key 已更新");
        };

    </script>
</body>
</html>
